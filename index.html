<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Défibrille — Quiz PSE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@200;400;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:        #E24B4A;
      --red-dark:   #A32D2D;
      --red-light:  #FCEBEB;
      --red-border: #F7C1C1;
      --cream:      #F2EDE3;
      --cream-dark: #E8E0D0;
      --black:      #1A1A1A;
      --muted:      #7A6E64;
      --card:       #FFFFFF;
      --border:     #DDD6CB;
      --c-blue:  #378ADD; --c-blue-bg:   #E6F1FB; --c-blue-border: #B5D4F4;
      --c-green: #5BAD72; --c-green-bg:  #EAF3DE; --c-green-border:#C0DD97;
      --c-amber: #EF9F27; --c-amber-bg:  #FAEEDA; --c-amber-border:#FAC775;
      --c-purple:#7F77DD; --c-purple-bg: #EEEDFE; --c-purple-border:#CECBF6;
      --radius:16px; --radius-sm:10px;
    }
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
    body{font-family:'Nunito',sans-serif;background:var(--cream);color:var(--black);min-height:100vh;display:flex;flex-direction:column;align-items:center;}
    .screen{display:none;width:100%;max-width:480px;padding:0 16px 48px;min-height:100vh;flex-direction:column;}
    .screen.active{display:flex;}

    /* LOADING */
    #screen-loading{align-items:center;justify-content:center;gap:20px;}
    .loader-ring{width:52px;height:52px;border:3px solid var(--cream-dark);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* LOGO */
    .logo{display:flex;align-items:center;gap:11px;}
    .logo-icon{background:var(--red);border-radius:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
    .logo-icon svg{fill:var(--cream);}
    .logo-defi{font-weight:900;color:var(--red);letter-spacing:-1px;}
    .logo-brille{font-weight:200;color:var(--black);letter-spacing:-1px;}
    .logo.sm .logo-icon{width:36px;height:36px;border-radius:10px;} .logo.sm .logo-icon svg{width:20px;height:20px;}
    .logo.sm .logo-defi,.logo.sm .logo-brille{font-size:24px;}
    .logo.lg .logo-icon{width:56px;height:56px;border-radius:16px;} .logo.lg .logo-icon svg{width:30px;height:30px;}
    .logo.lg .logo-defi,.logo.lg .logo-brille{font-size:38px;}
    .tagline{display:flex;align-items:center;gap:8px;margin-top:10px;}
    .tagline-line{height:1.5px;width:32px;background:var(--red);border-radius:2px;}
    .tagline-text{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:2px;text-transform:uppercase;}

    /* INTRO */
    #screen-intro{padding-top:52px;gap:0;}
    .intro-logo-wrap{display:flex;flex-direction:column;align-items:center;margin-bottom:28px;}
    .cats-row{display:flex;gap:6px;justify-content:center;margin-bottom:28px;flex-wrap:wrap;}
    .cat-pill{display:flex;align-items:center;gap:5px;padding:6px 10px;border-radius:20px;font-size:11px;font-weight:700;}
    .cat-pill-dot{width:7px;height:7px;border-radius:50%;}
    .field-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:8px;display:block;}
    .field-input{width:100%;padding:14px 16px;border:2px solid var(--border);border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:16px;font-weight:600;background:var(--card);color:var(--black);outline:none;transition:border-color .2s;margin-bottom:14px;}
    .field-input:focus{border-color:var(--red);}
    .field-input::placeholder{color:#C0B8AE;}
    .btn-main{width:100%;padding:16px;background:var(--red);color:var(--cream);border:none;border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:16px;font-weight:800;cursor:pointer;transition:background .15s,transform .1s;letter-spacing:.2px;}
    .btn-main:active{background:var(--red-dark);transform:scale(.98);}
    .btn-outline{width:100%;padding:14px;background:transparent;color:var(--black);border:1.5px solid var(--border);border-radius:var(--radius-sm);font-family:'Nunito',sans-serif;font-size:14px;font-weight:700;cursor:pointer;margin-bottom:10px;transition:border-color .15s;}
    .btn-outline:active{border-color:var(--red);}

    /* QUESTION */
    #screen-question{padding-top:18px;gap:0;}
    .q-topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;}
    .q-num{font-size:13px;font-weight:700;color:var(--muted);}
    .q-pts{display:flex;gap:6px;align-items:center;}
    .q-pts-ok{font-size:13px;font-weight:800;color:#2A6B3A;background:var(--c-green-bg);padding:3px 10px;border-radius:20px;}
    .q-pts-ko{font-size:13px;font-weight:800;color:var(--red-dark);background:var(--red-light);padding:3px 10px;border-radius:20px;}
    .progress-track{height:5px;background:var(--cream-dark);border-radius:5px;margin-bottom:18px;overflow:hidden;}
    .progress-fill{height:100%;background:var(--red);border-radius:5px;transition:width .4s ease;}
    .tp-dots{display:flex;gap:5px;justify-content:center;margin-bottom:18px;}
    .tp-dot{width:9px;height:9px;border-radius:50%;border:2px solid transparent;transition:all .25s;}
    .tp-dot.current{transform:scale(1.5);}
    .cat-tag{display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:20px;font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
    .cat-tag-dot{width:7px;height:7px;border-radius:50%;}
    .q-card{background:var(--card);border-radius:var(--radius);padding:20px;margin-bottom:12px;border:1.5px solid var(--border);}
    .q-text{font-size:16px;font-weight:700;line-height:1.5;color:var(--black);}
    .answers{display:flex;flex-direction:column;gap:9px;margin-bottom:12px;}
    .ans-wrap{border-radius:var(--radius-sm);border:1.5px solid var(--border);background:var(--card);overflow:hidden;transition:border-color .2s,background .2s;}
    .ans-btn{width:100%;background:none;border:none;padding:12px 14px;display:flex;align-items:flex-start;gap:10px;cursor:pointer;text-align:left;font-family:'Nunito',sans-serif;font-size:14px;font-weight:600;color:var(--black);line-height:1.45;}
    .ans-letter{flex-shrink:0;width:23px;height:23px;border-radius:6px;background:var(--cream);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;color:var(--muted);margin-top:1px;}
    .ans-expl{display:none;padding:8px 14px 11px 47px;font-size:12px;font-weight:600;line-height:1.55;border-top:1px solid transparent;}
    .ans-wrap.correct{border-color:var(--c-green);background:var(--c-green-bg);}
    .ans-wrap.correct .ans-btn{color:#2A6B3A;}
    .ans-wrap.correct .ans-letter{background:var(--c-green);color:#fff;}
    .ans-wrap.correct .ans-expl{display:block;color:#2A6B3A;border-color:var(--c-green-border);}
    .ans-wrap.wrong{border-color:var(--red);background:var(--red-light);}
    .ans-wrap.wrong .ans-btn{color:var(--red-dark);}
    .ans-wrap.wrong .ans-letter{background:var(--red);color:var(--cream);}
    .ans-wrap.wrong .ans-expl{display:block;color:var(--red-dark);border-color:var(--red-border);}
    .ans-wrap.other{opacity:.55;}
    .ans-wrap.other .ans-expl{display:block;color:var(--muted);border-color:var(--border);}
    #next-btn{width:100%;padding:15px;border-radius:var(--radius-sm);border:none;background:var(--black);color:var(--cream);font-family:'Nunito',sans-serif;font-size:15px;font-weight:800;cursor:pointer;display:none;transition:opacity .15s,transform .1s;margin-bottom:10px;}
    #next-btn:active{opacity:.8;transform:scale(.98);}

    /* REPORT */
    #report-section{display:none;margin-top:4px;}
    .report-toggle{background:none;border:none;font-family:'Nunito',sans-serif;font-size:12px;font-weight:600;color:var(--muted);cursor:pointer;padding:6px 0;display:flex;align-items:center;gap:5px;text-decoration:underline;text-underline-offset:2px;}
    .report-toggle:hover{color:var(--red);}
    #report-form{display:none;background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius-sm);padding:12px 14px;margin-top:8px;}
    .report-num{font-size:11px;font-weight:800;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-bottom:8px;}
    .report-textarea{width:100%;border:1.5px solid var(--border);border-radius:8px;padding:10px 12px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:600;color:var(--black);background:var(--cream);outline:none;resize:none;height:72px;transition:border-color .2s;}
    .report-textarea:focus{border-color:var(--red);}
    .report-textarea::placeholder{color:#C0B8AE;}
    .report-send{margin-top:8px;padding:9px 18px;background:var(--black);color:var(--cream);border:none;border-radius:8px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;cursor:pointer;}
    .report-confirm{display:none;font-size:12px;font-weight:700;color:var(--c-green);margin-top:8px;}

    /* END */
    #screen-end{padding-top:0;align-items:center;gap:0;}
    .end-hero{width:100%;background:var(--black);border-radius:0 0 var(--radius) var(--radius);padding:40px 24px 36px;text-align:center;margin-bottom:24px;}
    .end-pct{font-size:64px;font-weight:900;color:var(--red);line-height:1;}
    .end-score{font-size:15px;font-weight:600;color:#777;margin-top:4px;}
    .end-msg{font-size:15px;font-weight:700;color:var(--cream);margin-top:12px;line-height:1.5;max-width:280px;}
    .end-body{width:100%;padding:0 0 8px;}
    .section-title{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px;}
    .cat-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px;margin-bottom:24px;}
    .cat-result{border-radius:var(--radius-sm);padding:12px 14px;}
    .cat-result-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;display:flex;align-items:center;gap:5px;margin-bottom:6px;}
    .cat-result-score{font-size:22px;font-weight:900;margin-bottom:6px;}
    .cat-result-bar{height:3px;background:rgba(0,0,0,.1);border-radius:3px;overflow:hidden;}
    .cat-result-fill{height:100%;border-radius:3px;}
    .leaderboard{width:100%;margin-bottom:20px;}
    .lb-row{display:flex;align-items:center;gap:10px;padding:11px 14px;background:var(--card);border-radius:var(--radius-sm);border:1.5px solid var(--border);margin-bottom:6px;}
    .lb-row.me{border-color:var(--red);}
    .lb-rank{font-size:14px;font-weight:800;color:var(--muted);width:20px;flex-shrink:0;}
    .lb-name{flex:1;font-size:14px;font-weight:700;}
    .lb-score{font-size:14px;font-weight:800;color:var(--red);}
    .lb-pct{font-size:12px;color:var(--muted);font-weight:600;min-width:34px;text-align:right;}

    /* SVG bolt */
    .bolt-svg{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
  </style>
</head>
<body>

<!-- LOADING -->
<div id="screen-loading" class="screen active">
  <div class="loader-ring"></div>
  <p style="font-size:13px;font-weight:700;color:var(--muted);">Chargement…</p>
</div>

<!-- INTRO -->
<div id="screen-intro" class="screen">
  <div class="intro-logo-wrap">
    <div class="logo lg" style="margin-bottom:12px;">
      <div class="logo-icon"><svg viewBox="0 0 24 24"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg></div>
      <div class="logo-text"><span class="logo-defi">Défi</span><span class="logo-brille">brille</span></div>
    </div>
    <div class="tagline">
      <div class="tagline-line"></div>
      <span class="tagline-text">Révise · Joue · Sauve</span>
      <div class="tagline-line"></div>
    </div>
  </div>

  <p style="font-size:13px;font-weight:600;color:var(--muted);text-align:center;margin-bottom:20px;line-height:1.6;">
    <strong id="q-per-game" style="color:var(--black);">10</strong> questions aléatoires
    sur <strong id="q-total" style="color:var(--red);">…</strong> disponibles · PSE 2024
  </p>

  <div class="cats-row" id="cats-preview"></div>

  <label class="field-label" for="player-name">Ton prénom</label>
  <input class="field-input" type="text" id="player-name" placeholder="Ex : Marie" maxlength="30" autocomplete="off">
  <button class="btn-main" id="start-btn">Commencer ⚡</button>
</div>

<!-- QUESTION -->
<div id="screen-question" class="screen">
  <div class="q-topbar">
    <span class="q-num" id="q-counter">1 / 10</span>
    <div class="q-pts">
      <span class="q-pts-ok" id="q-score-ok">0 ✓</span>
      <span class="q-pts-ko" id="q-score-ko">0 ✗</span>
    </div>
  </div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
  <div class="tp-dots" id="tp-dots"></div>
  <div id="cat-tag" class="cat-tag"><span class="cat-tag-dot"></span><span id="cat-name"></span></div>
  <div class="q-card"><p class="q-text" id="q-text"></p></div>
  <div class="answers" id="answers"></div>
  <button id="next-btn">Question suivante →</button>

  <!-- REPORT -->
  <div id="report-section">
    <button class="report-toggle" onclick="toggleReport()">⚑ Signaler une imprécision sur cette question</button>
    <div id="report-form">
      <p class="report-num" id="report-num">Question #—</p>
      <textarea class="report-textarea" id="report-text" placeholder="Décris le problème ou la précision à apporter…"></textarea>
      <button class="report-send" onclick="sendReport()">Envoyer</button>
      <p class="report-confirm" id="report-confirm">✓ Signalement envoyé, merci !</p>
    </div>
  </div>
</div>

<!-- END -->
<div id="screen-end" class="screen">
  <div class="end-hero">
    <div class="logo" style="justify-content:center;margin-bottom:24px;">
      <div class="logo-icon" style="width:44px;height:44px;border-radius:12px;">
        <svg viewBox="0 0 24 24" style="width:24px;height:24px;fill:var(--cream);"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/></svg>
      </div>
      <div class="logo-text">
        <span class="logo-defi" style="font-size:28px;">Défi</span><span class="logo-brille" style="font-size:28px;color:var(--cream);">brille</span>
      </div>
    </div>
    <div class="end-pct" id="end-pct">0%</div>
    <div class="end-score" id="end-score-label">0 / 10</div>
    <div class="end-msg" id="end-msg"></div>
  </div>
  <div class="end-body">
    <p class="section-title">Par catégorie</p>
    <div class="cat-grid" id="cat-breakdown"></div>
    <div id="leaderboard-wrap" style="display:none;">
      <p class="section-title">🏆 Classement</p>
      <div class="leaderboard" id="leaderboard-list"></div>
    </div>
    <button class="btn-main" onclick="restartQuiz()" style="margin-bottom:10px;">⚡ Rejouer</button>
    <button class="btn-outline" onclick="showLeaderboard()">Voir les scores</button>
  </div>
</div>

<script>
// ================================================================
const SHEET_CSV_URL = 'https://docs.google.com/spreadsheets/d/1YlZ5K4aEeISSeK4tc_DleUtBLXwaSlmGEqb7LMZ8v1g/gviz/tq?tqx=out:csv&sheet=Questions';

// 2. URL de votre Apps Script déployé
const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycby1t0oPO3mnu5orXWY-9AYVUZr-ylV-1JS-jNB5E3YIC1tfyuMV6EQTxI2Fd-jLnp2O/exec';
const NB_QUESTIONS  = 10; // Nombre de questions par partie
// ================================================================

const CATEGORIES = {
  'Urgences Vitales':        { color:'#E24B4A', bg:'#FCEBEB', border:'#F7C1C1', emoji:'🚨' },
  'Détresses & Bilans':      { color:'#378ADD', bg:'#E6F1FB', border:'#B5D4F4', emoji:'📋' },
  'Hygiène & Protection':    { color:'#5BAD72', bg:'#EAF3DE', border:'#C0DD97', emoji:'🧤' },
  'Malaises & Affections':   { color:'#EF9F27', bg:'#FAEEDA', border:'#FAC775', emoji:'💊' },
  'Atteintes Particulières': { color:'#7F77DD', bg:'#EEEDFE', border:'#CECBF6', emoji:'⚡' },
};

let allQuestions=[], questions=[], currentQ=0, score=0, playerName='', answered=false, catScores={};

window.addEventListener('DOMContentLoaded', loadQuestions);

function loadQuestions() {
  if (SHEET_CSV_URL === 'REMPLACER_ICI_URL_CSV_QUESTIONS') { loadDemoQuestions(); return; }
  fetch(SHEET_CSV_URL)
    .then(r => r.text())
    .then(csv => { allQuestions = parseCSV(csv); allQuestions.length ? initIntro() : loadDemoQuestions(); })
    .catch(loadDemoQuestions);
}

function parseCSV(csv) {
  const lines = csv.trim().split('\n'), qs = [];
  for (let i = 1; i < lines.length; i++) {
    const c = splitCSV(lines[i]);
    if (c.length < 11) continue;
    qs.push({
      cat:  c[0].trim(),
      q:    c[1].trim(),
      opts: [c[2].trim(), c[3].trim(), c[4].trim(), c[5].trim()],
      ok:   ['A','B','C','D'].indexOf(c[6].trim().toUpperCase()),
      expls:[c[7].trim(), c[8].trim(), c[9].trim(), c[10].trim()],
      num:  c[11] ? c[11].trim() : `Q${String(i).padStart(3,'0')}` // numero_question
    });
  }
  return qs;
}

function splitCSV(line) {
  const r=[];let cur='',inQ=false;
  for(let i=0;i<line.length;i++){const c=line[i];if(c==='"'){inQ=!inQ;continue;}if(c===','&&!inQ){r.push(cur);cur='';continue;}cur+=c;}
  r.push(cur);return r;
}

function loadDemoQuestions() { allQuestions = DEMO_QUESTIONS; initIntro(); }

function initIntro() {
  const preview = document.getElementById('cats-preview');
  Object.entries(CATEGORIES).forEach(([cat, c]) => {
    preview.innerHTML += `<div class="cat-pill" style="background:${c.bg};color:${c.color};">
      <span class="cat-pill-dot" style="background:${c.color};"></span>
      <span>${cat.split(' ')[0]}</span></div>`;
  });
  document.getElementById('q-total').textContent = allQuestions.length;
  document.getElementById('q-per-game').textContent = Math.min(NB_QUESTIONS, allQuestions.length);
  document.getElementById('screen-loading').classList.remove('active');
  document.getElementById('screen-intro').classList.add('active');
  document.getElementById('start-btn').addEventListener('click', startQuiz);
  document.getElementById('player-name').addEventListener('keydown', e => e.key==='Enter' && startQuiz());
}

function startQuiz() {
  playerName = document.getElementById('player-name').value.trim() || 'Anonyme';
  // Sélection aléatoire de NB_QUESTIONS questions
  questions = shuffle([...allQuestions]).slice(0, NB_QUESTIONS);
  currentQ=0; score=0; answered=false;
  catScores={};
  Object.keys(CATEGORIES).forEach(c => catScores[c]={correct:0,total:0});
  document.getElementById('screen-intro').classList.remove('active');
  document.getElementById('screen-question').classList.add('active');
  buildDots(); renderQuestion();
}

function shuffle(a) {
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function buildDots() {
  const el=document.getElementById('tp-dots'); el.innerHTML='';
  questions.forEach((q,i) => {
    const c=CATEGORIES[q.cat]||CATEGORIES['Urgences Vitales'];
    const d=document.createElement('div');
    d.className='tp-dot'+(i===0?' current':'');
    d.id='dot-'+i;
    d.style.background=i===0?c.color:c.bg;
    d.style.borderColor=c.color;
    el.appendChild(d);
  });
}

function updateDots() {
  questions.forEach((q,i) => {
    const d=document.getElementById('dot-'+i); if(!d)return;
    const c=CATEGORIES[q.cat]||CATEGORIES['Urgences Vitales'];
    if(i<currentQ){d.className='tp-dot';d.style.background=c.color;d.style.borderColor='transparent';}
    else if(i===currentQ){d.className='tp-dot current';d.style.background=c.color;d.style.borderColor=c.color;}
    else{d.className='tp-dot';d.style.background=c.bg;d.style.borderColor=c.color;}
  });
}

function renderQuestion() {
  answered=false;
  const q=questions[currentQ], c=CATEGORIES[q.cat]||CATEGORIES['Urgences Vitales'];

  document.getElementById('q-counter').textContent=`${currentQ+1} / ${questions.length}`;
  document.getElementById('q-score-ok').textContent=`${score} ✓`;
  document.getElementById('q-score-ko').textContent=`${currentQ - score} ✗`;
  const fill=document.getElementById('progress-fill');
  fill.style.width=Math.round((currentQ/questions.length)*100)+'%';
  fill.style.background=c.color;
  updateDots();

  const tag=document.getElementById('cat-tag');
  tag.style.background=c.bg; tag.style.color=c.color;
  tag.querySelector('.cat-tag-dot').style.background=c.color;
  document.getElementById('cat-name').textContent=q.cat;
  document.getElementById('q-text').textContent=q.q;

  const cont=document.getElementById('answers'); cont.innerHTML='';
  ['A','B','C','D'].forEach((l,i) => {
    const w=document.createElement('div'); w.className='ans-wrap'; w.id='aw-'+i;
    w.innerHTML=`<button class="ans-btn" onclick="checkAnswer(${i})">
      <span class="ans-letter">${l}</span><span>${q.opts[i]}</span></button>
      <div class="ans-expl" id="expl-${i}">${q.expls[i]}</div>`;
    cont.appendChild(w);
  });

  const btn=document.getElementById('next-btn');
  btn.style.display='none'; btn.style.background=c.color;
  btn.textContent=currentQ<questions.length-1?'Question suivante →':'Voir mon résultat →';
  btn.onclick=nextQuestion;

  // Reset report section
  document.getElementById('report-section').style.display='none';
  document.getElementById('report-form').style.display='none';
  document.getElementById('report-num').textContent='Question #'+q.num;
  document.getElementById('report-text').value='';
  document.getElementById('report-confirm').style.display='none';
}

function checkAnswer(chosen) {
  if(answered)return; answered=true;
  const q=questions[currentQ], ok=(chosen===q.ok);
  if(ok) score++;
  catScores[q.cat].total++;
  if(ok) catScores[q.cat].correct++;

  ['A','B','C','D'].forEach((_,i) => {
    const w=document.getElementById('aw-'+i);
    w.querySelector('.ans-btn').onclick=null;
    if(i===q.ok) w.className='ans-wrap correct';
    else if(i===chosen&&!ok) w.className='ans-wrap wrong';
    else w.className='ans-wrap other';
  });

  document.getElementById('q-score-ok').textContent=`${score} ✓`;
  document.getElementById('q-score-ko').textContent=`${currentQ + 1 - score} ✗`;

  // Montrer le bouton de signalement après la réponse
  document.getElementById('report-section').style.display='block';

  setTimeout(()=>btn.scrollIntoView({behavior:'smooth',block:'nearest'}),200);
}

function nextQuestion() {
  currentQ++;
  if(currentQ>=questions.length){showEnd();}else{renderQuestion();window.scrollTo(0,0);}
}

function toggleReport() {
  const form=document.getElementById('report-form');
  form.style.display=form.style.display==='none'?'block':'none';
}

function sendReport() {
  const text=document.getElementById('report-text').value.trim();
  if(!text) return;
  const q=questions[currentQ];
  document.getElementById('report-confirm').style.display='none';
  if(SCRIPT_URL!=='REMPLACER_ICI_URL_APPS_SCRIPT') {
    fetch(SCRIPT_URL, {
      method: 'POST',
      mode:   'no-cors',
      body:   JSON.stringify({type:'report', numero:q.num, prenom:playerName, commentaire:text})
    }).catch(()=>{});
  }
  document.getElementById('report-text').value='';
  document.getElementById('report-confirm').style.display='block';
  setTimeout(()=>{document.getElementById('report-form').style.display='none';},2000);
}

function showEnd() {
  document.getElementById('screen-question').classList.remove('active');
  document.getElementById('screen-end').classList.add('active');
  window.scrollTo(0,0);
  const pct=Math.round((score/questions.length)*100);
  const msg=pct>=80?`Excellent ${playerName} ! Tu maîtrises les gestes qui sauvent. ⚡`
            :pct>=50?`Bien joué ! Encore quelques révisions et tu brilles. 💪`
            :`Continue à t'entraîner — ces gestes peuvent sauver des vies.`;
  document.getElementById('end-pct').textContent=pct+'%';
  document.getElementById('end-score-label').textContent=score+' / '+questions.length+' bonnes réponses';
  document.getElementById('end-msg').textContent=msg;
  const bd=document.getElementById('cat-breakdown'); bd.innerHTML='';
  Object.entries(catScores).forEach(([cat,data])=>{
    if(!data.total)return;
    const c=CATEGORIES[cat], p=Math.round((data.correct/data.total)*100);
    bd.innerHTML+=`<div class="cat-result" style="background:${c.bg};">
      <div class="cat-result-label" style="color:${c.color};">
        <span style="width:8px;height:8px;border-radius:50%;background:${c.color};flex-shrink:0;"></span>
        <span>${cat.split(' ')[0]}</span></div>
      <div class="cat-result-score" style="color:${c.color};">${data.correct}/${data.total}</div>
      <div class="cat-result-bar"><div class="cat-result-fill" style="width:${p}%;background:${c.color};"></div></div></div>`;
  });
  saveScore(pct);
}

function saveScore(pct) {
  if(SCRIPT_URL==='REMPLACER_ICI_URL_APPS_SCRIPT')return;
  fetch(SCRIPT_URL, {
    method: 'POST',
    mode:   'no-cors',
    body:   JSON.stringify({prenom:playerName, score, total:questions.length, pct})
  }).catch(()=>{});
}

function showLeaderboard() {
  const wrap=document.getElementById('leaderboard-wrap'); wrap.style.display='block';
  if(SCRIPT_URL==='REMPLACER_ICI_URL_APPS_SCRIPT'){
    document.getElementById('leaderboard-list').innerHTML='<p style="font-size:13px;color:var(--muted);font-weight:600;">Configurez l\'Apps Script pour voir le classement.</p>';return;}
  document.getElementById('leaderboard-list').innerHTML='<p style="font-size:13px;color:var(--muted);font-weight:600;">Chargement…</p>';
  fetch(SCRIPT_URL).then(r=>r.json()).then(rows=>{
    const list=document.getElementById('leaderboard-list');
    if(!rows||!rows.length){list.innerHTML='<p style="font-size:13px;color:var(--muted);">Aucun score.</p>';return;}
    list.innerHTML='';
    rows.slice(0,10).forEach((row,i)=>{
      const isMe=(row.prenom===playerName&&row.score==score);
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      list.innerHTML+=`<div class="lb-row ${isMe?'me':''}">
        <span class="lb-rank">${medal||(i+1)}</span>
        <span class="lb-name">${row.prenom}</span>
        <span class="lb-score">${row.score}/${row.total}</span>
        <span class="lb-pct">${row.pct}</span></div>`;
    });
  }).catch(()=>{document.getElementById('leaderboard-list').innerHTML='<p style="font-size:13px;color:var(--muted);">Erreur de chargement.</p>';});
}

function restartQuiz() {
  document.getElementById('screen-end').classList.remove('active');
  document.getElementById('leaderboard-wrap').style.display='none';
  document.getElementById('screen-intro').classList.add('active');
}
